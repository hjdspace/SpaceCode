name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            bun_target: bun-darwin-arm64
            bun_ext: ""
          - os: ubuntu-latest
            platform: linux
            bun_target: bun-linux-x64
            bun_ext: ""
          - os: windows-latest
            platform: win
            bun_target: bun-windows-x64
            bun_ext: ".exe"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip build-essential python3 g++ make

      - name: Install Python setuptools (macOS)
        if: matrix.platform == 'mac'
        run: pip3 install setuptools --break-system-packages

      - name: Install Python setuptools (Windows)
        if: matrix.platform == 'win'
        run: pip install setuptools

      - name: Install app dependencies
        run: npm ci

      - name: Install engine dependencies
        run: cd engine && bun install

      - name: Copy Bun binary to engine/bin (Linux/macOS)
        if: matrix.platform != 'win'
        shell: bash
        run: |
          mkdir -p engine/bin
          BUN_PATH=$(which bun)
          cp "$BUN_PATH" "engine/bin/bun${{ matrix.bun_ext }}"
          chmod +x "engine/bin/bun${{ matrix.bun_ext }}" 2>/dev/null || true
          ls -lh engine/bin/

      - name: Copy Bun binary to engine/bin (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path engine/bin | Out-Null
          $bunPath = (Get-Command bun).Source
          Copy-Item $bunPath -Destination "engine/bin/bun.exe"
          Get-ChildItem engine/bin/

      - name: Build engine
        run: cd engine && bun run build

      - name: Build engine desktop bundle (dist-desktop for Electron extraResources)
        run: cd engine && bun run build-desktop.ts

      - name: Write build-time secrets
        shell: bash
        env:
          GH_OAUTH_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const secrets = {};
            if (process.env.GH_OAUTH_SECRET) secrets.GITHUB_CLIENT_SECRET = process.env.GH_OAUTH_SECRET;
            fs.writeFileSync('electron/secrets.json', JSON.stringify(secrets, null, 2));
            console.log('secrets.json written, keys:', Object.keys(secrets));
          "

      - name: Rebuild native modules (Linux - in old-glibc container)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e ELECTRON_CACHE=/workspace/.electron-cache \
            node:20-bullseye \
            bash -c "
              set -e
              apt-get update -qq && apt-get install -y -qq python3 build-essential >/dev/null
              ln -sf /usr/bin/python3 /usr/local/bin/python || true
              npx --yes @electron/rebuild@^3 -f -w node-pty
            "
          sudo chown -R "$(id -u):$(id -g)" node_modules/node-pty .electron-cache 2>/dev/null || true

          echo "=== Verifying node-pty native binary glibc requirement ==="
          PTY_NODE="node_modules/node-pty/build/Release/pty.node"
          if [ -f "$PTY_NODE" ]; then
            echo "OK: $PTY_NODE exists"
            ls -lh "$PTY_NODE"
            echo "--- GLIBC versions referenced by pty.node ---"
            objdump -T "$PTY_NODE" 2>/dev/null | grep -oE 'GLIBC_[0-9.]+' | sort -V -u || true
          else
            echo "ERROR: node-pty native binary not found after rebuild!"
            find node_modules/node-pty -name "*.node" -type f 2>/dev/null || true
            exit 1
          fi

      - name: Rebuild native modules (macOS / Windows)
        if: matrix.platform != 'linux'
        shell: bash
        run: |
          # 使用 @electron/rebuild（新包名，老包 electron-rebuild 已弃用）
          # 针对当前项目安装的 Electron 版本重新编译 node-pty
          npx --yes @electron/rebuild@^3 -f -w node-pty

          echo "=== Verifying node-pty native binary ==="
          NODE_PTY_DIR="node_modules/node-pty"
          if [ -f "$NODE_PTY_DIR/build/Release/pty.node" ]; then
            echo "OK: build/Release/pty.node exists"
            ls -lh "$NODE_PTY_DIR/build/Release/pty.node"
          elif [ -f "$NODE_PTY_DIR/prebuilds/${{ matrix.platform == 'linux' && 'linux-x64' || matrix.platform == 'mac' && 'darwin-x64' || 'win32-x64' }}/pty.node" ]; then
            echo "OK: prebuild exists"
          else
            echo "ERROR: node-pty native binary not found after rebuild!"
            echo "--- Contents of node-pty ---"
            find "$NODE_PTY_DIR" -name "*.node" -type f 2>/dev/null || true
            ls -la "$NODE_PTY_DIR/build" 2>/dev/null || echo "(no build/ dir)"
            ls -la "$NODE_PTY_DIR/prebuilds" 2>/dev/null || echo "(no prebuilds/ dir)"
            exit 1
          fi

      - name: Build frontend
        run: npx vite build

      - name: Build & Publish (Mac)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="release-notes/v${{ steps.version.outputs.value }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::warning::Missing release notes file: $NOTES_FILE, using empty notes"
            echo "body=_" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<__RELEASE_NOTES__'
              cat "$NOTES_FILE"
              echo
              echo '__RELEASE_NOTES__'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false --notes "${{ steps.release_notes.outputs.body }}"
          echo "Release published with release notes."
