name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            bun_target: bun-darwin-arm64
            bun_ext: ""
          - os: ubuntu-latest
            platform: linux
            bun_target: bun-linux-x64
            bun_ext: ""
          - os: windows-2022
            platform: win
            bun_target: bun-windows-x64
            bun_ext: ".exe"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip build-essential python3 g++ make

      - name: Install Python setuptools (macOS)
        if: matrix.platform == 'mac'
        run: pip3 install setuptools --break-system-packages

      - name: Install Python setuptools (Windows)
        if: matrix.platform == 'win'
        run: pip install setuptools

      - name: Set up MSVC Dev Tools (Windows)
        if: matrix.platform == 'win'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install app dependencies
        run: npm ci

      - name: Install engine dependencies
        run: cd engine && bun install

      - name: Copy Bun binary to engine/bin (Linux/macOS)
        if: matrix.platform != 'win'
        shell: bash
        run: |
          mkdir -p engine/bin
          BUN_PATH=$(which bun)
          cp "$BUN_PATH" "engine/bin/bun${{ matrix.bun_ext }}"
          chmod +x "engine/bin/bun${{ matrix.bun_ext }}" 2>/dev/null || true
          ls -lh engine/bin/

      - name: Copy Bun binary to engine/bin (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path engine/bin | Out-Null
          $bunPath = (Get-Command bun).Source
          Copy-Item $bunPath -Destination "engine/bin/bun.exe"
          Get-ChildItem engine/bin/

      - name: Build engine
        run: cd engine && bun run build

      - name: Build engine desktop bundle (dist-desktop for Electron extraResources)
        run: cd engine && bun run build-desktop.ts

      - name: Write build-time secrets
        shell: bash
        env:
          GH_OAUTH_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const secrets = {};
            if (process.env.GH_OAUTH_SECRET) secrets.GITHUB_CLIENT_SECRET = process.env.GH_OAUTH_SECRET;
            fs.writeFileSync('electron/secrets.json', JSON.stringify(secrets, null, 2));
            console.log('secrets.json written, keys:', Object.keys(secrets));
          "

      - name: Rebuild native modules (Linux - in old-glibc container)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e ELECTRON_CACHE=/workspace/.electron-cache \
            node:20-bullseye \
            bash -c "
              set -e
              apt-get update -qq && apt-get install -y -qq python3 build-essential >/dev/null
              ln -sf /usr/bin/python3 /usr/local/bin/python || true
              npx --yes @electron/rebuild@^3 -f -w node-pty
            "
          sudo chown -R "$(id -u):$(id -g)" node_modules/node-pty .electron-cache 2>/dev/null || true

          echo "=== Verifying node-pty native binary glibc requirement ==="
          PTY_NODE="node_modules/node-pty/build/Release/pty.node"
          if [ -f "$PTY_NODE" ]; then
            echo "OK: $PTY_NODE exists"
            ls -lh "$PTY_NODE"
            echo "--- GLIBC versions referenced by pty.node ---"
            objdump -T "$PTY_NODE" 2>/dev/null | grep -oE 'GLIBC_[0-9.]+' | sort -V -u || true
          else
            echo "ERROR: node-pty native binary not found after rebuild!"
            find node_modules/node-pty -name "*.node" -type f 2>/dev/null || true
            exit 1
          fi

      - name: Rebuild native modules (macOS / Windows)
        if: matrix.platform != 'linux'
        shell: bash
        run: |
          npx --yes @electron/rebuild@^3 -f -w node-pty

          echo "=== Verifying node-pty native binary ==="
          NODE_PTY_DIR="node_modules/node-pty"
          if [ -f "$NODE_PTY_DIR/build/Release/pty.node" ]; then
            echo "OK: build/Release/pty.node exists"
            ls -lh "$NODE_PTY_DIR/build/Release/pty.node"
          elif [ -f "$NODE_PTY_DIR/prebuilds/${{ matrix.platform == 'linux' && 'linux-x64' || matrix.platform == 'mac' && 'darwin-x64' || 'win32-x64' }}/pty.node" ]; then
            echo "OK: prebuild exists"
          else
            echo "ERROR: node-pty native binary not found after rebuild!"
            echo "--- Contents of node-pty ---"
            find "$NODE_PTY_DIR" -name "*.node" -type f 2>/dev/null || true
            ls -la "$NODE_PTY_DIR/build" 2>/dev/null || echo "(no build/ dir)"
            ls -la "$NODE_PTY_DIR/prebuilds" 2>/dev/null || echo "(no prebuilds/ dir)"
            exit 1
          fi

      - name: Build frontend
        run: npx vite build

      - name: Build & Publish (Mac)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install mobile-app dependencies
        working-directory: mobile-app
        run: flutter pub get

      - name: Patch file_picker compileSdk for AGP 9 compatibility
        shell: bash
        run: |
          # file_picker 8.3.7 仍以 compileSdk 34 构建，与 AGP 9 / flutter_plugin_android_lifecycle
          # 要求的 compileSdk 36+ 不兼容。强制升级到 36 以避免构建失败。
          PUB_CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          FILE_PICKER_GRADLE="$PUB_CACHE/hosted/pub.flutter-io.cn/file_picker-*/android/build.gradle"
          for f in $FILE_PICKER_GRADLE; do
            if [ -f "$f" ]; then
              echo "Patching $f"
              sed -i 's/compileSdk 34/compileSdk 36/g' "$f"
              grep -n "compileSdk" "$f"
            fi
          done

      - name: Strip Aliyun/Tencent mirrors for CI (GitHub Actions runs abroad)
        working-directory: mobile-app/android
        shell: bash
        run: |
          # GitHub Actions 在国外，访问 Google Maven / Maven Central / Gradle 源很快，
          # 不需要国内镜像。阿里云镜像对 AGP 9.0.1 部分依赖（aaptcompiler、signflinger）
          # 同步不及时会导致 502 错误，所以直接移除镜像配置。
          for f in settings.gradle.kts build.gradle.kts; do
            if [ -f "$f" ]; then
              echo "=== Before: $f ==="
              grep -n "aliyun\|tencent\|flutter-io" "$f" || true
              # 移除阿里云、腾讯云、flutter-io 镜像行
              sed -i '/maven { url = uri("https:\/\/maven.aliyun.com/d' "$f"
              sed -i '/maven { url = uri("https:\/\/mirrors.cloud.tencent.com/d' "$f"
              sed -i '/maven { url = uri("https:\/\/download.flutter.io/d' "$f"
              echo "=== After: $f ==="
              grep -n "maven\|google\|mavenCentral" "$f" | head -20
            fi
          done
          # 同时恢复 Gradle wrapper 为官方源
          WRAPPER=gradle/wrapper/gradle-wrapper.properties
          if [ -f "$WRAPPER" ]; then
            echo "=== Before: $WRAPPER ==="
            cat "$WRAPPER"
            # 直接重写 distributionUrl 行为官方源（避免 sed 转义 \: 的复杂性）
            sed -i 's|^distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-9.1.0-all.zip|' "$WRAPPER"
            echo "=== After: $WRAPPER ==="
            cat "$WRAPPER"
          fi

      - name: Build release APK
        working-directory: mobile-app
        env:
          MOBILE_GITHUB_CLIENT_ID: ${{ secrets.MOBILE_GITHUB_CLIENT_ID }}
        run: |
          CLIENT_ID="${MOBILE_GITHUB_CLIENT_ID:-Ov23liy70dXxRSWb0uHP}"
          flutter build apk --release --no-pub \
            --dart-define=SPACE_CODE_GITHUB_CLIENT_ID="$CLIENT_ID"
          echo "=== APK 构建产物 ==="
          ls -lh build/app/outputs/flutter-apk/

      - name: Generate artifact name with version
        id: artifact_name
        working-directory: mobile-app
        shell: bash
        run: |
          # Flutter 把 pubspec.yaml 的 version 编译到 APK；从 pubspec 读取
          PUBSPEC_VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "version=$PUBSPEC_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=spacecode-mobile-v${PUBSPEC_VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Rename APK artifact
        working-directory: mobile-app
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/${{ steps.artifact_name.outputs.apk_name }}"
          ls -lh dist/

      - name: Upload APK to GitHub Release
        working-directory: mobile-app
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ steps.artifact_name.outputs.release_tag }}"
          APK="dist/${{ steps.artifact_name.outputs.apk_name }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG 已存在，追加 APK..."
            gh release upload "$TAG" "$APK" --clobber
          else
            echo "Release $TAG 不存在，创建 draft release..."
            gh release create "$TAG" "$APK" \
              --draft \
              --title "$TAG" \
              --notes "SpaceCode Mobile v${{ steps.artifact_name.outputs.version }} 安卓客户端"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacecode-mobile-android-apk
          path: mobile-app/dist/*.apk
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs: [build, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="release-notes/v${{ steps.version.outputs.value }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::warning::Missing release notes file: $NOTES_FILE, using empty notes"
            echo "body=_" >> "$GITHUB_OUTPUT"
          else
            {
              echo 'body<<__RELEASE_NOTES__'
              cat "$NOTES_FILE"
              echo
              echo '__RELEASE_NOTES__'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false --notes "${{ steps.release_notes.outputs.body }}"
          echo "Release published with release notes."
