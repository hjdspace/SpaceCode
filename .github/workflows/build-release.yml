name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 0.2.2)'
        required: true
        default: '0.2.1'
      create_release:
        description: '是否创建 Release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

