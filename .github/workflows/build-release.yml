name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            bun_target: bun-windows-x64
            bun_ext: .exe
          - os: macos-latest
            platform: mac
            bun_target: bun-darwin-arm64
            bun_ext: ""
          - os: ubuntu-latest
            platform: linux
            bun_target: bun-linux-x64
            bun_ext: ""
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux/macOS: 使用 setup-bun
      - name: Setup Bun (Linux/macOS)
        if: matrix.platform != 'win'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Windows: 手动下载 Bun (v0.2.0 方式)
      - name: Download Bun (Windows)
        if: matrix.platform == 'win'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path engine/bin
          Invoke-WebRequest -Uri "https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64.zip" -OutFile "bun-windows-x64.zip"
          Expand-Archive -Path "bun-windows-x64.zip" -DestinationPath "$env:TEMP\bun-temp" -Force
          $bunExe = Get-ChildItem -Path "$env:TEMP\bun-temp" -Filter "bun.exe" -Recurse | Select-Object -First 1
          if ($bunExe) {
            Move-Item -Path $bunExe.FullName -Destination "engine/bin/bun.exe" -Force
          } else {
            Write-Error "bun.exe not found in archive"
            exit 1
          }
          Remove-Item -Path "$env:TEMP\bun-temp" -Recurse -Force
          Remove-Item -Path "bun-windows-x64.zip" -Force

      - name: Add Bun to PATH (Windows)
        if: matrix.platform == 'win'
        shell: powershell
        run: echo "${{ github.workspace }}\engine\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq unzip build-essential python3 g++ make

      - name: Install Python setuptools (macOS)
        if: matrix.platform == 'mac'
        run: pip3 install setuptools --break-system-packages

      - name: Install Python setuptools (Windows)
        if: matrix.platform == 'win'
        run: pip install setuptools

      - name: Install app dependencies
        run: npm ci

      # Windows: 构建 engine
      - name: Build engine (Windows)
        if: matrix.platform == 'win'
        run: cd engine && bun run build

      # Linux/macOS: 安装 engine 依赖并构建
      - name: Install engine dependencies (Linux/macOS)
        if: matrix.platform != 'win'
        run: cd engine && bun install

      - name: Copy Bun binary to engine/bin (Linux/macOS)
        if: matrix.platform != 'win'
        shell: bash
        run: |
          mkdir -p engine/bin
          BUN_PATH=$(which bun)
          cp "$BUN_PATH" "engine/bin/bun${{ matrix.bun_ext }}"
          chmod +x "engine/bin/bun${{ matrix.bun_ext }}" 2>/dev/null || true
          ls -lh engine/bin/

      - name: Build engine (Linux/macOS)
        if: matrix.platform != 'win'
        run: cd engine && bun run build

      - name: Write build-time secrets
        shell: bash
        env:
          GH_OAUTH_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          node -e "
            const fs = require('fs');
            const secrets = {};
            if (process.env.GH_OAUTH_SECRET) secrets.GITHUB_CLIENT_SECRET = process.env.GH_OAUTH_SECRET;
            fs.writeFileSync('electron/secrets.json', JSON.stringify(secrets, null, 2));
            console.log('secrets.json written, keys:', Object.keys(secrets));
          "

      # Linux/macOS: 重建原生模块
      - name: Rebuild native modules (Linux/macOS)
        if: matrix.platform != 'win'
        run: npx electron-rebuild

      # Linux/macOS: 使用 vite build
      - name: Build frontend (Linux/macOS)
        if: matrix.platform != 'win'
        run: npx vite build

      # Windows: 使用 npm run build (v0.2.0 方式)
      - name: Build application (Windows)
        if: matrix.platform == 'win'
        run: npm run build

      - name: Enable Windows long paths
        if: matrix.platform == 'win'
        shell: powershell
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
          git config --system core.longpaths true

      - name: Build & Publish (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (Mac)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-updates:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download release assets and sync to Chengdu
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHENGDU_HOST: 47.108.25.68
          CHENGDU_PASS: ${{ secrets.CHENGDU_SSH_PASS }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

          mkdir -p updates
          gh release download "${GITHUB_REF_NAME}" -D updates/
          echo "Downloaded assets:"
          ls -lh updates/

          gh release edit "${GITHUB_REF_NAME}" --draft=false
          echo "Release published."

          echo "Uploading to Chengdu server..."
          sshpass -p "$CHENGDU_SSH_PASS" scp -o StrictHostKeyChecking=no updates/* root@${CHENGDU_HOST}:/www/wwwroot/claude-app/updates/

          echo "Cleaning old files..."
          sshpass -p "$CHENGDU_SSH_PASS" ssh -o StrictHostKeyChecking=no root@${CHENGDU_HOST} "
            cd /www/wwwroot/claude-app/updates/
            for f in *.exe *.exe.blockmap *.zip *.zip.blockmap *.dmg *.dmg.blockmap *.AppImage *.deb; do
              if [ -f \"\$f\" ] && ! echo \"\$f\" | grep -q '${VERSION}'; then
                echo \"Removing old: \$f\"
                rm -f \"\$f\"
              fi
            done
            chown -R www:www /www/wwwroot/claude-app/updates/
            echo 'Files on server:'
            ls -lh /www/wwwroot/claude-app/updates/
          "
          echo "Done!"
