name: Build and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm unzip build-essential python3 g++ make

      - name: Download Bun (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p engine/bin
          curl -fsSL -o bun-linux-x64.zip "https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64.zip"
          unzip -o bun-linux-x64.zip -d /tmp/
          mv /tmp/bun-linux-x64/bun engine/bin/bun-linux-x64
          chmod +x engine/bin/bun-linux-x64
          rm -rf bun-linux-x64.zip /tmp/bun-linux-x64/

      - name: Download Bun (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64'
        run: |
          mkdir -p engine/bin
          curl -fsSL -o bun-darwin-x64.zip "https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-x64.zip"
          unzip -o bun-darwin-x64.zip -d /tmp/
          mv /tmp/bun-darwin-x64/bun engine/bin/bun-darwin-x64
          chmod +x engine/bin/bun-darwin-x64
          rm -rf bun-darwin-x64.zip /tmp/bun-darwin-x64/

      - name: Download Bun (macOS arm64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        run: |
          mkdir -p engine/bin
          curl -fsSL -o bun-darwin-aarch64.zip "https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-aarch64.zip"
          unzip -o bun-darwin-aarch64.zip -d /tmp/
          mv /tmp/bun-darwin-aarch64/bun engine/bin/bun-darwin-arm64
          chmod +x engine/bin/bun-darwin-arm64
          rm -rf bun-darwin-aarch64.zip /tmp/bun-darwin-aarch64/

      - name: Download Bun (Windows)
        if: matrix.platform == 'win'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path engine/bin
          Invoke-WebRequest -Uri "https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64.zip" -OutFile "bun-windows-x64.zip"
          Expand-Archive -Path "bun-windows-x64.zip" -DestinationPath "$env:TEMP\bun-temp" -Force
          $bunExe = Get-ChildItem -Path "$env:TEMP\bun-temp" -Filter "bun.exe" -Recurse | Select-Object -First 1
          if ($bunExe) {
            Move-Item -Path $bunExe.FullName -Destination "engine/bin/bun-windows-x64.exe" -Force
          } else {
            Write-Error "bun.exe not found in archive"
            exit 1
          }
          Remove-Item -Path "$env:TEMP\bun-temp" -Recurse -Force
          Remove-Item -Path "bun-windows-x64.zip" -Force

      - name: Rebuild native modules
        run: npx electron-rebuild
        
      - name: Build application
        run: npm run build

      - name: Build Electron (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64'
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron (macOS arm64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.exe.blockmap

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm

      - name: Upload artifacts (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip

      - name: Upload artifacts (macOS arm64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: |
            release/*-arm64.dmg
            release/*-arm64.dmg.blockmap
            release/*-arm64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*" | head -50

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "Generating release notes for version $VERSION"

          # 尝试从 CHANGELOG.md 提取当前版本的发布说明
          if [ -f CHANGELOG.md ]; then
            # 提取当前版本到下一个版本标题之间的内容
            RELEASE_NOTES=$(awk '/^## \['$VERSION'\]/{flag=1;next}/^## \[/{flag=0}flag' CHANGELOG.md | sed '/^$/N;/^\n$/d')
            if [ -n "$RELEASE_NOTES" ]; then
              echo "Found release notes in CHANGELOG.md"
              echo "notes<<EOF" >> $GITHUB_OUTPUT
              echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # 如果 CHANGELOG 中没有，使用 git log 生成
          echo "Generating release notes from git log..."
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD | grep -E "^-( feat|fix|perf|refactor|docs)" || echo "")
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" | head -30 | grep -E "^-( feat|fix|perf|refactor|docs)" || echo "")
          fi

          if [ -n "$NOTES" ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "## SpaceCode v$VERSION" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "**完整更新日志**: 参见 [CHANGELOG.md](./CHANGELOG.md)" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.blockmap
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: ${{ steps.release_notes.outputs.notes }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
