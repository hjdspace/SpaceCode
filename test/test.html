<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test HTML</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { color: #2563eb; }
    .card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin: 16px 0; }
    button { background: #2563eb; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h1>Test HTML</h1>
  <p>这是一个测试用的 HTML 文件。</p>
  <div class="card">
    <p><strong>点击按钮测试交互：</strong></p>
    <button onclick="document.getElementById('msg').textContent = '按钮被点击了！'">点击我</button>
    <p id="msg"></p>
  </div>
</body>
</html>
