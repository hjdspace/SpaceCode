<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案B: 顶部标签页 + 卡片式内容布局</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --surface-soft: #1e2a4a;
    --surface-card: #1e2a4a;
    --border-default: rgba(255,255,255,0.08);
    --text-primary: #e8e8f0;
    --text-secondary: #a0a0b8;
    --text-muted: #6a6a82;
    --accent-primary: #6c63ff;
    --accent-primary-rgb: 108,99,255;
    --accent-glow: rgba(108,99,255,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }

  .settings-page { height: 100%; display: flex; flex-direction: column; }

  /* Header with tabs */
  .settings-header {
    display: flex; align-items: center; gap: 20px;
    padding: 12px 24px; border-bottom: 1px solid var(--border-default);
    background: var(--bg-primary); flex-shrink: 0;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    border-radius: 8px; color: var(--text-muted); font-size: 13px;
    background: none; border: none; cursor: pointer; transition: all 0.2s;
  }
  .back-btn:hover { background: var(--surface-soft); color: var(--text-primary); }
  .settings-title { font-size: 15px; font-weight: 600; white-space: nowrap; }

  /* Horizontal tabs */
  .tab-bar {
    display: flex; gap: 2px; flex: 1; overflow-x: auto; padding: 0 8px;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    border-radius: 8px; color: var(--text-muted); font-size: 13px;
    font-weight: 500; background: none; border: none; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .tab-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
  .tab-item.active { background: var(--accent-glow); color: var(--accent-primary); }
  .tab-item svg { width: 14px; height: 14px; }
  .tab-badge {
    font-size: 10px; padding: 1px 5px; border-radius: 4px;
    background: rgba(108,99,255,0.15); color: var(--accent-primary); font-weight: 600;
  }

  .header-actions { display: flex; gap: 8px; }
  .search-btn {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    background: var(--surface-soft); border: 1px solid var(--border-default);
    border-radius: 8px; color: var(--text-muted); font-size: 13px; cursor: pointer;
  }
  .search-btn:hover { border-color: var(--accent-primary); color: var(--text-primary); }

  /* Content */
  .settings-content { flex: 1; overflow: hidden; }
  .content-scroll { height: 100%; overflow-y: auto; padding: 28px 40px; max-width: 960px; margin: 0 auto; }

  .content-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .content-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

  /* Card sections */
  .card-section {
    background: var(--surface-card); border: 1px solid var(--border-default);
    border-radius: 14px; padding: 20px; margin-bottom: 16px;
  }
  .card-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-section-title {
    font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .card-section-title .icon {
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    background: var(--accent-glow); border-radius: 8px; color: var(--accent-primary); font-size: 14px;
  }
  .card-section-action {
    font-size: 12px; color: var(--accent-primary); background: none; border: none;
    cursor: pointer; font-weight: 500;
  }

  /* Form inside cards */
  .form-row { display: flex; gap: 16px; margin-bottom: 14px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .form-input {
    padding: 9px 12px; background: var(--bg-primary); border: 1px solid var(--border-default);
    border-radius: 8px; color: var(--text-primary); font-size: 13px;
  }
  .form-input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
  .form-input::placeholder { color: var(--text-muted); }

  /* Inline card select */
  .inline-select {
    display: flex; gap: 8px;
  }
  .inline-select-item {
    flex: 1; padding: 10px 14px; background: var(--bg-primary);
    border: 2px solid transparent; border-radius: 8px; cursor: pointer;
    text-align: center; font-size: 13px; font-weight: 500; color: var(--text-primary);
    transition: all 0.2s;
  }
  .inline-select-item:hover { border-color: var(--border-default); }
  .inline-select-item.active { border-color: var(--accent-primary); background: var(--accent-glow); }
  .inline-select-item .item-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Toggle row */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border-default);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-info { display: flex; flex-direction: column; gap: 2px; }
  .toggle-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .toggle-desc { font-size: 11px; color: var(--text-muted); }
  .toggle-switch {
    width: 40px; height: 22px; background: var(--bg-primary); border-radius: 11px;
    border: 1px solid var(--border-default); position: relative; cursor: pointer; transition: all 0.2s;
  }
  .toggle-switch::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    background: white; border-radius: 50%; transition: transform 0.2s;
  }
  .toggle-switch.on { background: var(--accent-primary); border-color: var(--accent-primary); }
  .toggle-switch.on::after { transform: translateX(18px); }

  /* Quick stats bar */
  .quick-stats {
    display: flex; gap: 12px; margin-bottom: 20px;
  }
  .stat-chip {
    display: flex; align-items: center; gap: 6px; padding: 8px 14px;
    background: var(--surface-card); border: 1px solid var(--border-default);
    border-radius: 10px; font-size: 12px; color: var(--text-secondary);
  }
  .stat-chip strong { color: var(--text-primary); font-size: 14px; }

  .layout-note {
    position: fixed; bottom: 16px; right: 16px; padding: 10px 16px;
    background: var(--accent-primary); color: white; border-radius: 8px;
    font-size: 12px; font-weight: 600; z-index: 100;
  }
</style>
</head>
<body>
<div class="settings-page">
  <div class="settings-header">
    <button class="back-btn">← 返回</button>
    <h1 class="settings-title">设置</h1>
    <div class="tab-bar">
      <button class="tab-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="3"/><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/></svg>
        通用
      </button>
      <button class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M12 8V4H8"/></svg>
        模型
        <span class="tab-badge">5</span>
      </button>
      <button class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M4 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M4 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
        MCP
      </button>
      <button class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        工具
      </button>
      <button class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
        外观
      </button>
      <button class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/></svg>
        快捷键
      </button>
      <button class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Hooks
      </button>
      <button class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        Token
      </button>
    </div>
    <div class="header-actions">
      <button class="search-btn">🔍 搜索</button>
    </div>
  </div>

  <main class="settings-content">
    <div class="content-scroll">
      <h2 class="content-title">通用设置</h2>
      <p class="content-desc">管理应用的基础配置，包括语言、引擎和项目设置。</p>

      <div class="quick-stats">
        <div class="stat-chip">🤖 引擎 <strong>Claude Code</strong></div>
        <div class="stat-chip">🌐 语言 <strong>简体中文</strong></div>
        <div class="stat-chip">🔌 MCP <strong>2 个服务</strong></div>
      </div>

      <!-- Card: Language -->
      <div class="card-section">
        <div class="card-section-header">
          <div class="card-section-title">
            <span class="icon">🌐</span>
            界面语言
          </div>
        </div>
        <div class="inline-select">
          <div class="inline-select-item active">🇨🇳 简体中文</div>
          <div class="inline-select-item">🇺🇸 English</div>
        </div>
      </div>

      <!-- Card: Engine -->
      <div class="card-section">
        <div class="card-section-header">
          <div class="card-section-title">
            <span class="icon">🤖</span>
            Agent Engine
          </div>
        </div>
        <div class="inline-select">
          <div class="inline-select-item active">
            Claude Code
            <div class="item-desc">Original engine</div>
          </div>
          <div class="inline-select-item" style="opacity:0.5;cursor:not-allowed;">
            Pi
            <div class="item-desc">SDK not installed</div>
          </div>
        </div>
      </div>

      <!-- Card: Project -->
      <div class="card-section">
        <div class="card-section-header">
          <div class="card-section-title">
            <span class="icon">📁</span>
            项目配置
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">项目根目录</label>
            <div style="display:flex;gap:8px;">
              <input class="form-input" style="flex:1" value="/Users/dev/my-project" />
              <button style="padding:8px 14px;background:var(--bg-primary);border:1px solid var(--border-default);border-radius:8px;color:var(--text-muted);cursor:pointer;">浏览</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Card: Editor -->
      <div class="card-section">
        <div class="card-section-header">
          <div class="card-section-title">
            <span class="icon">✏️</span>
            编辑器选项
          </div>
        </div>
        <div class="toggle-row">
          <div class="toggle-info">
            <span class="toggle-label">显示行号</span>
            <span class="toggle-desc">在代码块中显示行号</span>
          </div>
          <button class="toggle-switch on"></button>
        </div>
        <div class="toggle-row">
          <div class="toggle-info">
            <span class="toggle-label">自动换行</span>
            <span class="toggle-desc">长行自动换行显示</span>
          </div>
          <button class="toggle-switch on"></button>
        </div>
        <div class="toggle-row">
          <div class="toggle-info">
            <span class="toggle-label">显示小地图</span>
            <span class="toggle-desc">在编辑器右侧显示代码缩略图</span>
          </div>
          <button class="toggle-switch"></button>
        </div>
        <div class="toggle-row">
          <div class="toggle-info">
            <span class="toggle-label">平滑滚动</span>
            <span class="toggle-desc">启用平滑滚动动画</span>
          </div>
          <button class="toggle-switch on"></button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="layout-note">方案B: 顶部标签页 + 卡片式内容布局</div>
</body>
</html>
