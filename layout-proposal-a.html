<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案A: 分组侧边导航 + 双栏内容布局</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-tertiary: #0f3460;
    --surface-soft: #1e2a4a;
    --surface-card: #1e2a4a;
    --border-default: rgba(255,255,255,0.08);
    --text-primary: #e8e8f0;
    --text-secondary: #a0a0b8;
    --text-muted: #6a6a82;
    --accent-primary: #6c63ff;
    --accent-primary-rgb: 108,99,255;
    --accent-glow: rgba(108,99,255,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }

  .settings-page { height: 100%; display: flex; flex-direction: column; }

  /* Header */
  .settings-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border-default);
    background: var(--bg-primary); flex-shrink: 0;
  }
  .back-btn {
    display: flex; align-items: center; gap: 8px; padding: 6px 14px;
    border-radius: 8px; color: var(--text-muted); font-size: 13px;
    font-weight: 500; background: none; border: none; cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { background: var(--surface-soft); color: var(--text-primary); }
  .settings-title { font-size: 16px; font-weight: 600; }
  .header-search {
    display: flex; align-items: center; gap: 8px; padding: 6px 14px;
    background: var(--surface-soft); border: 1px solid var(--border-default);
    border-radius: 8px; width: 240px;
  }
  .header-search input {
    background: none; border: none; color: var(--text-primary); font-size: 13px; flex: 1; outline: none;
  }
  .header-search input::placeholder { color: var(--text-muted); }
  .header-search svg { color: var(--text-muted); width: 14px; height: 14px; }

  /* Body */
  .settings-body { flex: 1; display: flex; overflow: hidden; }

  /* Left Nav - Grouped */
  .settings-nav {
    width: 240px; background: var(--bg-secondary); border-right: 1px solid var(--border-default);
    padding: 16px 12px; overflow-y: auto; flex-shrink: 0;
  }
  .nav-group { margin-bottom: 20px; }
  .nav-group-label {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.8px; padding: 0 12px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: 8px; color: var(--text-muted); font-size: 13px;
    font-weight: 500; background: none; border: none; cursor: pointer;
    transition: all 0.15s; text-align: left; width: 100%;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent-primary); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 4px;
    background: rgba(108,99,255,0.15); color: var(--accent-primary); font-weight: 600;
  }

  /* Right Content - Two Column */
  .settings-content { flex: 1; overflow: hidden; }
  .content-scroll {
    height: 100%; overflow-y: auto; padding: 28px 36px;
  }
  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .content-title { font-size: 22px; font-weight: 600; }
  .content-breadcrumb { font-size: 12px; color: var(--text-muted); }
  .content-breadcrumb span { color: var(--accent-primary); }

  /* Two-column form grid */
  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px 32px;
  }
  .form-grid .full-width { grid-column: 1 / -1; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .form-input {
    padding: 9px 12px; background: var(--surface-soft); border: 1px solid var(--border-default);
    border-radius: 8px; color: var(--text-primary); font-size: 13px;
  }
  .form-input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-hint { font-size: 11px; color: var(--text-muted); }

  .divider { height: 1px; background: var(--border-default); margin: 4px 0; grid-column: 1 / -1; }

  .subsection-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); grid-column: 1 / -1; }

  /* Card selection */
  .card-grid { display: flex; gap: 10px; grid-column: 1 / -1; }
  .select-card {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 12px; background: var(--surface-card); border: 2px solid transparent;
    border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 13px;
    font-weight: 500; color: var(--text-primary);
  }
  .select-card:hover { background: rgba(255,255,255,0.04); }
  .select-card.active { border-color: var(--accent-primary); background: var(--accent-glow); }
  .select-card .card-icon { font-size: 20px; }
  .select-card .card-desc { font-size: 11px; color: var(--text-muted); }

  /* Toggle */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; grid-column: 1 / -1;
  }
  .toggle-info { display: flex; flex-direction: column; gap: 2px; }
  .toggle-label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .toggle-desc { font-size: 11px; color: var(--text-muted); }
  .toggle-switch {
    width: 40px; height: 22px; background: var(--bg-tertiary); border-radius: 11px;
    position: relative; cursor: pointer; transition: all 0.2s; border: none;
  }
  .toggle-switch::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
    background: white; border-radius: 50%; transition: transform 0.2s;
  }
  .toggle-switch.on { background: var(--accent-primary); }
  .toggle-switch.on::after { transform: translateX(18px); }

  /* Info box */
  .info-box {
    grid-column: 1 / -1; padding: 14px 16px; border-radius: 10px;
    border: 1px solid var(--border-default); background: rgba(108,99,255,0.04);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .info-box svg { width: 16px; height: 16px; color: var(--accent-primary); flex-shrink: 0; margin-top: 2px; }
  .info-box p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

  /* Responsive note */
  .layout-note {
    position: fixed; bottom: 16px; right: 16px; padding: 10px 16px;
    background: var(--accent-primary); color: white; border-radius: 8px;
    font-size: 12px; font-weight: 600; z-index: 100;
  }
</style>
</head>
<body>
<div class="settings-page">
  <div class="settings-header">
    <button class="back-btn">← 返回应用</button>
    <h1 class="settings-title">设置</h1>
    <div class="header-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="搜索设置项..." />
    </div>
  </div>

  <div class="settings-body">
    <nav class="settings-nav">
      <div class="nav-group">
        <div class="nav-group-label">基础</div>
        <button class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          通用
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
          模型设置
          <span class="nav-badge">5</span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">连接</div>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M4 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M13 7H8"/><path d="M21 7h-4"/><path d="M13 15H8"/><path d="M21 15h-4"/></svg>
          MCP 服务器
          <span class="nav-badge">2</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          工具
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">界面</div>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
          外观
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M9 8v8"/><path d="M15 8v8"/><path d="M7 12h2"/><path d="M15 12h2"/></svg>
          快捷键
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">高级</div>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Hooks
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
          Token 用量
        </button>
      </div>
    </nav>

    <main class="settings-content">
      <div class="content-scroll">
        <div class="content-header">
          <div>
            <div class="content-breadcrumb">设置 / <span>通用</span></div>
            <h2 class="content-title">通用设置</h2>
          </div>
        </div>

        <div class="form-grid">
          <div class="subsection-title">语言 & 引擎</div>

          <div class="form-group full-width">
            <label class="form-label">界面语言</label>
            <div class="card-grid">
              <div class="select-card active">
                <span class="card-icon">🇨🇳</span>
                简体中文 ✓
              </div>
              <div class="select-card">
                <span class="card-icon">🇺🇸</span>
                English
              </div>
            </div>
          </div>

          <div class="form-group full-width">
            <label class="form-label">Agent Engine</label>
            <div class="card-grid">
              <div class="select-card active">
                <span class="card-icon">🤖</span>
                Claude Code
                <span class="card-desc">Original claude-code engine</span>
              </div>
              <div class="select-card" style="opacity:0.5;cursor:not-allowed;">
                <span class="card-icon">⚡</span>
                Pi
                <span class="card-desc">SDK not installed</span>
              </div>
            </div>
          </div>

          <div class="divider"></div>
          <div class="subsection-title">项目配置</div>

          <div class="form-group full-width">
            <label class="form-label">项目根目录</label>
            <div style="display:flex;gap:8px;">
              <input class="form-input" style="flex:1" placeholder="D:\Projects\my-project" value="/Users/dev/my-project" />
              <button style="padding:8px 14px;background:var(--surface-soft);border:1px solid var(--border-default);border-radius:8px;color:var(--text-muted);cursor:pointer;">📁</button>
            </div>
            <span class="form-hint">选择项目的工作目录</span>
          </div>

          <div class="divider"></div>
          <div class="subsection-title">显示选项</div>

          <div class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-label">显示行号</span>
              <span class="toggle-desc">在代码块中显示行号</span>
            </div>
            <button class="toggle-switch on"></button>
          </div>
          <div class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-label">自动换行</span>
              <span class="toggle-desc">长行自动换行显示</span>
            </div>
            <button class="toggle-switch on"></button>
          </div>
          <div class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-label">显示小地图</span>
              <span class="toggle-desc">在编辑器右侧显示代码缩略图</span>
            </div>
            <button class="toggle-switch"></button>
          </div>

          <div class="info-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            <p>双栏布局可充分利用宽屏空间，将相关表单字段并排展示，减少页面纵向滚动。导航分组让用户更快定位目标设置项。</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="layout-note">方案A: 分组侧边导航 + 双栏内容布局</div>
</body>
</html>
