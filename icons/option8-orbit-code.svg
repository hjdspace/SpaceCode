<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#061224"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="core8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="orbit8a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24" stop-opacity="0"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orbit8b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6" stop-opacity="0"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#f472b6" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg8)"/>

  <!-- Background stars -->
  <g fill="#fff" opacity="0.2">
    <circle cx="90" cy="110" r="1.5"/>
    <circle cx="420" cy="90" r="1"/>
    <circle cx="440" cy="220" r="2"/>
    <circle cx="70" cy="320" r="1"/>
    <circle cx="110" cy="440" r="1.5"/>
    <circle cx="390" cy="430" r="1"/>
    <circle cx="250" cy="50" r="1"/>
    <circle cx="460" cy="380" r="1.5"/>
  </g>

  <!-- Orbit ring 1 (horizontal, tilted) -->
  <ellipse cx="256" cy="256" rx="180" ry="50" fill="none"
           stroke="url(#orbit8a)" stroke-width="3"
           transform="rotate(-15 256 256)" opacity="0.7"/>

  <!-- Orbit ring 2 (vertical, tilted) -->
  <ellipse cx="256" cy="256" rx="50" ry="180" fill="none"
           stroke="url(#orbit8b)" stroke-width="3"
           transform="rotate(20 256 256)" opacity="0.5"/>

  <!-- Orbit ring 3 (diagonal) -->
  <ellipse cx="256" cy="256" rx="170" ry="170" fill="none"
           stroke="#818cf8" stroke-width="1.5" opacity="0.15"/>

  <!-- Central AI core -->
  <circle cx="256" cy="256" r="55" fill="url(#core8)" opacity="0.2" filter="url(#glow8)"/>
  <circle cx="256" cy="256" r="32" fill="url(#core8)" filter="url(#glow8)"/>
  <circle cx="256" cy="256" r="18" fill="#fff" opacity="0.3"/>

  <!-- Orbiting code symbols -->
  <!-- < orbiting top-left -->
  <g transform="translate(130, 170)" filter="url(#glow8)">
    <path d="M18,0 L0,14 L18,28" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- / orbiting top-right -->
  <g transform="translate(370, 200)" filter="url(#glow8)">
    <line x1="20" y1="0" x2="0" y2="28" stroke="#c084fc" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- > orbiting bottom-right -->
  <g transform="translate(360, 340)" filter="url(#glow8)">
    <path d="M0,0 L18,14 L0,28" fill="none" stroke="#f472b6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- { orbiting bottom-left -->
  <g transform="translate(140, 330)" filter="url(#glow8)">
    <path d="M15,0 Q0,0 0,15 L0,22 Q0,30 -8,35 Q0,40 0,48 L0,55 Q0,70 15,70"
          fill="none" stroke="#fbbf24" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Connection lines from core to symbols -->
  <g opacity="0.15">
    <line x1="256" y1="256" x2="140" y2="184" stroke="#22d3ee" stroke-width="2"/>
    <line x1="256" y1="256" x2="380" y2="214" stroke="#c084fc" stroke-width="2"/>
    <line x1="256" y1="256" x2="370" y2="354" stroke="#f472b6" stroke-width="2"/>
    <line x1="256" y1="256" x2="150" y2="365" stroke="#fbbf24" stroke-width="2"/>
  </g>
</svg>