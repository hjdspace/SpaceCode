<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0823"/>
      <stop offset="100%" style="stop-color:#1e1045"/>
    </linearGradient>
    <linearGradient id="frame9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="text9" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="planet9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg9)"/>

  <!-- Starfield background -->
  <g fill="#fff" opacity="0.3">
    <circle cx="70" cy="90" r="1"/>
    <circle cx="200" cy="70" r="1.5"/>
    <circle cx="350" cy="85" r="1"/>
    <circle cx="450" cy="110" r="2"/>
    <circle cx="90" cy="250" r="1"/>
    <circle cx="50" cy="400" r="1.5"/>
    <circle cx="430" cy="380" r="1"/>
    <circle cx="380" cy="450" r="1.5"/>
    <circle cx="120" cy="460" r="1"/>
    <circle cx="460" cy="280" r="1"/>
  </g>

  <!-- Small planet with ring (top-right decoration) -->
  <g transform="translate(390, 120)">
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#planet9)" stroke-width="2.5"
             transform="rotate(-20)" opacity="0.7"/>
    <circle cx="0" cy="0" r="18" fill="url(#planet9)" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="40" ry="14" fill="none" stroke="url(#planet9)" stroke-width="1"
             transform="rotate(-20)" opacity="0.3"/>
  </g>

  <!-- App window frame -->
  <rect x="76" y="130" width="360" height="260" rx="20" fill="#0a0418" stroke="url(#frame9)" stroke-width="3" filter="url(#glow9)"/>

  <!-- Title bar -->
  <rect x="76" y="130" width="360" height="44" rx="20" fill="url(#frame9)" opacity="0.15"/>
  <rect x="76" y="152" width="360" height="22" fill="url(#frame9)" opacity="0.15"/>

  <!-- Window dots -->
  <circle cx="104" cy="152" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="126" cy="152" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="148" cy="152" r="6" fill="#22c55e" opacity="0.8"/>

  <!-- Code lines -->
  <g filter="url(#glow9)">
    <!-- Line 1: prompt + code -->
    <text x="100" y="210" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="url(#text9)">&gt;_</text>
    <rect x="140" y="196" width="120" height="8" rx="4" fill="#22d3ee" opacity="0.6"/>
    <rect x="140" y="210" width="80" height="8" rx="4" fill="#818cf8" opacity="0.4"/>
  </g>

  <!-- Code block lines -->
  <rect x="100" y="240" width="160" height="6" rx="3" fill="#6366f1" opacity="0.3"/>
  <rect x="116" y="256" width="200" height="6" rx="3" fill="#818cf8" opacity="0.25"/>
  <rect x="116" y="272" width="140" height="6" rx="3" fill="#a855f7" opacity="0.2"/>
  <rect x="100" y="288" width="180" height="6" rx="3" fill="#6366f1" opacity="0.3"/>
  <rect x="116" y="304" width="100" height="6" rx="3" fill="#818cf8" opacity="0.2"/>

  <!-- Cursor -->
  <rect x="226" y="298" width="10" height="16" rx="2" fill="#22d3ee">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- AI badge (bottom-right of window) -->
  <g transform="translate(350, 340)" filter="url(#glow9)">
    <circle cx="0" cy="0" r="24" fill="#0a0418" stroke="url(#frame9)" stroke-width="2.5"/>
    <!-- Small sparkle inside badge -->
    <path d="M0,-14 Q3,-3 14,0 Q3,3 0,14 Q-3,3 -14,0 Q-3,-3 0,-14Z"
          fill="url(#text9)" opacity="0.9"/>
  </g>

  <!-- Bottom decorative dots -->
  <g opacity="0.5">
    <circle cx="110" cy="440" r="3" fill="#6366f1"/>
    <circle cx="130" cy="440" r="3" fill="#818cf8"/>
    <circle cx="150" cy="440" r="3" fill="#a855f7"/>
  </g>
</svg>