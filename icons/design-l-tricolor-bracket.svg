<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1c1c1c"/>
    </linearGradient>
    <linearGradient id="grad-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg-l)"/>

  <!-- Three overlapping shapes forming </> -->
  <!-- Left < in red-orange -->
  <path d="M230,140 L120,256 L230,372"
        fill="none" stroke="#f43f5e" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right > in green -->
  <path d="M282,140 L392,256 L282,372"
        fill="none" stroke="#22c55e" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center / in yellow, overlapping -->
  <line x1="270" y1="140" x2="242" y2="372"
        stroke="#fbbf24" stroke-width="30" stroke-linecap="round"/>

  <!-- Glow at intersection points -->
  <circle cx="120" cy="256" r="6" fill="#f43f5e"/>
  <circle cx="392" cy="256" r="6" fill="#22c55e"/>
</svg>