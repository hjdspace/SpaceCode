<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="prompt5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="spark5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg5)"/>

  <!-- Subtle background stars -->
  <g fill="#fff" opacity="0.3">
    <circle cx="80" cy="100" r="1.5"/>
    <circle cx="420" cy="80" r="1"/>
    <circle cx="440" cy="200" r="2"/>
    <circle cx="70" cy="300" r="1"/>
    <circle cx="100" cy="420" r="1.5"/>
    <circle cx="400" cy="440" r="1"/>
    <circle cx="380" cy="380" r="1.5"/>
    <circle cx="130" cy="200" r="1"/>
  </g>

  <!-- Terminal prompt >  -->
  <path d="M150,180 L250,256 L150,332"
        fill="none" stroke="url(#prompt5)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow5)"/>

  <!-- Underline / cursor -->
  <rect x="280" y="316" width="90" height="24" rx="12" fill="url(#prompt5)" filter="url(#glow5)"/>

  <!-- Four-pointed star (sparkle) -->
  <g transform="translate(370, 150)" filter="url(#glow5)">
    <path d="M0,-45 Q8,-8 45,0 Q8,8 0,45 Q-8,8 -45,0 Q-8,-8 0,-45Z"
          fill="url(#spark5)" opacity="0.95"/>
  </g>

  <!-- Small sparkle -->
  <g transform="translate(120, 380)">
    <path d="M0,-18 Q3,-3 18,0 Q3,3 0,18 Q-3,3 -18,0 Q-3,-3 0,-18Z"
          fill="url(#spark5)" opacity="0.6"/>
  </g>
</svg>