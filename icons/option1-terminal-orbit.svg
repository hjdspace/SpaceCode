<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="orbit1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg1)"/>

  <!-- Terminal window -->
  <rect x="96" y="140" width="320" height="232" rx="16" fill="#0f3460" stroke="url(#accent1)" stroke-width="4"/>
  <rect x="96" y="140" width="320" height="40" rx="16" fill="#1a1a2e"/>
  <rect x="96" y="164" width="320" height="16" fill="#1a1a2e"/>

  <!-- Window dots -->
  <circle cx="124" cy="160" r="7" fill="#e94560"/>
  <circle cx="148" cy="160" r="7" fill="#f5a623"/>
  <circle cx="172" cy="160" r="7" fill="#4ecca3"/>

  <!-- Terminal content: code lines -->
  <rect x="120" y="200" width="140" height="10" rx="5" fill="#533483" opacity="0.8"/>
  <rect x="120" y="224" width="220" height="10" rx="5" fill="#0f3460" opacity="0.9"/>
  <rect x="136" y="248" width="180" height="10" rx="5" fill="#533483" opacity="0.6"/>
  <rect x="120" y="272" width="100" height="10" rx="5" fill="#0f3460" opacity="0.7"/>
  <rect x="120" y="296" width="160" height="10" rx="5" fill="#533483" opacity="0.5"/>

  <!-- Cursor blink -->
  <rect x="280" y="296" width="12" height="14" rx="2" fill="url(#accent1)">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Orbital ring around terminal -->
  <ellipse cx="256" cy="256" rx="210" ry="80" fill="none" stroke="url(#orbit1)" stroke-width="3" opacity="0.6"
           transform="rotate(-20 256 256)"/>
  <ellipse cx="256" cy="256" rx="230" ry="60" fill="none" stroke="url(#accent1)" stroke-width="2" opacity="0.3"
           transform="rotate(15 256 256)"/>

  <!-- Star/sparkle at top right -->
  <g transform="translate(380, 110)">
    <path d="M0,-28 Q0,0 28,0 Q0,0 0,28 Q0,0 -28,0 Q0,0 0,-28Z" fill="url(#accent1)" opacity="0.95">
      <animateTransform attributeName="transform" type="scale" values="1;1.15;1" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Small star particles -->
  <circle cx="90" cy="400" r="3" fill="#4ecca3" opacity="0.7"/>
  <circle cx="420" cy="380" r="2.5" fill="#f5a623" opacity="0.6"/>
  <circle cx="130" cy="110" r="2" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="400" cy="420" r="2" fill="#4ecca3" opacity="0.4"/>
</svg>