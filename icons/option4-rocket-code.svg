<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1e1e3f"/>
    </linearGradient>
    <linearGradient id="rocket4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="trail4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316" stop-opacity="0"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="code4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rocketClip">
      <path d="M256,80
               C300,80 340,130 340,200
               C340,250 320,290 290,330
               L280,380 L232,380 L222,330
               C192,290 172,250 172,200
               C172,130 212,80 256,80Z"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg4)"/>

  <!-- Background star field -->
  <g fill="#fff" opacity="0.3">
    <circle cx="72" cy="92" r="1.5"/><circle cx="140" cy="56" r="1"/>
    <circle cx="380" cy="72" r="2"/><circle cx="440" cy="120" r="1"/>
    <circle cx="60" cy="200" r="1"/><circle cx="452" cy="240" r="1.5"/>
    <circle cx="84" cy="350" r="1.5"/><circle cx="52" cy="430" r="1"/>
    <circle cx="432" cy="370" r="2"/><circle cx="460" cy="440" r="1"/>
    <circle cx="380" cy="460" r="1.5"/><circle cx="132" cy="464" r="1"/>
    <circle cx="256" cy="48" r="1.5"/><circle cx="320" cy="54" r="1"/>
  </g>

  <!-- Flame trail behind rocket -->
  <ellipse cx="256" cy="420" rx="60" ry="30" fill="url(#trail4)" opacity="0.5">
    <animate attributeName="rx" values="55;65;55" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="0.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="256" cy="440" rx="40" ry="18" fill="#fbbf24" opacity="0.3">
    <animate attributeName="rx" values="35;45;35" dur="0.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Rocket body -->
  <path d="M256,76
           C302,76 344,128 344,202
           C344,254 323,296 292,336
           L282,388 L230,388 L220,336
           C189,296 168,254 168,202
           C168,128 210,76 256,76Z"
        fill="url(#rocket4)" filter="url(#glow4)"/>

  <!-- Rocket window (shows code inside) -->
  <circle cx="256" cy="200" r="44" fill="#0f0f23" stroke="#fbbf24" stroke-width="4"/>
  <circle cx="256" cy="200" r="36" fill="#1e1e3f"/>

  <!-- Code symbols inside window -->
  <g clip-path="url(#codeClip)" font-family="monospace" font-weight="bold" font-size="20" fill="url(#code4)">
    <text x="228" y="190">&lt;/&gt;</text>
    <text x="234" y="218" font-size="16" fill="#fbbf24">{ }</text>
  </g>

  <clipPath id="codeClip">
    <circle cx="256" cy="200" r="34"/>
  </clipPath>

  <!-- Rocket fins -->
  <path d="M172,220 L140,300 L175,270 Z" fill="#dc2626"/>
  <path d="M340,220 L372,300 L337,270 Z" fill="#dc2626"/>

  <!-- Rocket center line detail -->
  <line x1="256" y1="248" x2="256" y2="376" stroke="#fbbf24" stroke-width="2.5" opacity="0.5"/>

  <!-- Nose cone highlight -->
  <path d="M256,76 C280,76 304,94 320,122 C298,100 270,90 256,90 Z" fill="#fff" opacity="0.15"/>

  <!-- Speed lines -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.3" stroke-linecap="round">
    <line x1="120" y1="160" x2="155" y2="165"><animate attributeName="x1" values="110;120;110" dur="1.5s" repeatCount="indefinite"/><animate attributeName="x2" values="145;155;145" dur="1.5s" repeatCount="indefinite"/></line>
    <line x1="104" y1="200" x2="152" y2="205"><animate attributeName="x1" values="94;104;94" dur="1.2s" repeatCount="indefinite"/><animate attributeName="x2" values="142;152;142" dur="1.2s" repeatCount="indefinite"/></line>
    <line x1="360" y1="165" x2="398" y2="158"><animate attributeName="x1" values="360;370;360" dur="1.3s" repeatCount="indefinite"/><animate attributeName="x2" values="398;408;398" dur="1.3s" repeatCount="indefinite"/></line>
    <line x1="362" y1="208" x2="410" y2="200"><animate attributeName="x1" values="362;372;362" dur="1.6s" repeatCount="indefinite"/><animate attributeName="x2" values="410;420;410" dur="1.6s" repeatCount="indefinite"/></line>
  </g>
</svg>