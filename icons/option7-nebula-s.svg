<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0221"/>
      <stop offset="50%" style="stop-color:#190b3e"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="sgrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="35%" style="stop-color:#818cf8"/>
      <stop offset="65%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg7)"/>

  <!-- Nebula clouds -->
  <ellipse cx="160" cy="180" rx="120" ry="80" fill="#818cf8" opacity="0.06"/>
  <ellipse cx="350" cy="330" rx="130" ry="90" fill="#f472b6" opacity="0.05"/>
  <ellipse cx="256" cy="256" rx="180" ry="120" fill="#c084fc" opacity="0.04"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.4">
    <circle cx="80" cy="100" r="1.5"/>
    <circle cx="430" cy="120" r="2"/>
    <circle cx="400" cy="80" r="1"/>
    <circle cx="70" cy="380" r="1.5"/>
    <circle cx="440" cy="400" r="1"/>
    <circle cx="100" cy="450" r="1.5"/>
    <circle cx="390" cy="460" r="1"/>
    <circle cx="256" cy="60" r="1"/>
    <circle cx="60" cy="256" r="1"/>
    <circle cx="460" cy="256" r="1"/>
  </g>

  <!-- S monogram made of code brackets -->
  <!-- The S is formed by: top curve -> diagonal -> bottom curve -->
  <g filter="url(#glow7)">
    <!-- Top arc of S (opening left, like { ) -->
    <path d="M330,150 C310,130 270,125 240,140 C210,155 200,180 210,205 C215,220 230,230 250,235 L280,242 C310,250 330,265 330,290 C330,320 310,345 270,360 C240,370 210,365 185,350"
          fill="none" stroke="url(#sgrad7)" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- Code bracket accents integrated into the S -->
  <!-- Top < accent -->
  <path d="M310,130 L295,145 L310,160"
        fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Bottom > accent -->
  <path d="M195,335 L210,350 L195,365"
        fill="none" stroke="#f472b6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Sparkle -->
  <g transform="translate(360, 200)">
    <path d="M0,-20 Q4,-4 20,0 Q4,4 0,20 Q-4,4 -20,0 Q-4,-4 0,-20Z"
          fill="#fbbf24" opacity="0.8"/>
  </g>
  <g transform="translate(160, 340)">
    <path d="M0,-12 Q2,-2 12,0 Q2,2 0,12 Q-2,2 -12,0 Q-2,-2 0,-12Z"
          fill="#06b6d4" opacity="0.6"/>
  </g>
</svg>