<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1e1e3f"/>
    </linearGradient>
    <linearGradient id="grad-k" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg-k)"/>

  <!-- Minimal app window (like VS Code) with AI cursor -->
  <!-- Window frame -->
  <rect x="96" y="120" width="320" height="272" rx="24" fill="none" stroke="url(#grad-k)" stroke-width="6" opacity="0.3"/>

  <!-- Left sidebar accent -->
  <rect x="96" y="120" width="72" height="272" rx="24" fill="url(#grad-k)" opacity="0.08"/>
  <line x1="168" y1="120" x2="168" y2="392" stroke="url(#grad-k)" stroke-width="3" opacity="0.2"/>

  <!-- Sidebar icons (dots) -->
  <circle cx="132" cy="168" r="8" fill="url(#grad-k)" opacity="0.6"/>
  <rect x="120" y="200" width="24" height="8" rx="4" fill="url(#grad-k)" opacity="0.3"/>
  <rect x="120" y="220" width="24" height="8" rx="4" fill="url(#grad-k)" opacity="0.2"/>

  <!-- Code editor area -->
  <!-- Code lines -->
  <rect x="196" y="160" width="14" height="8" rx="4" fill="url(#grad-k)" opacity="0.5"/>
  <rect x="216" y="160" width="100" height="8" rx="4" fill="url(#grad-k)" opacity="0.3"/>

  <rect x="196" y="184" width="14" height="8" rx="4" fill="url(#grad-k)" opacity="0.4"/>
  <rect x="216" y="184" width="140" height="8" rx="4" fill="url(#grad-k)" opacity="0.25"/>

  <rect x="210" y="208" width="14" height="8" rx="4" fill="url(#grad-k)" opacity="0.5"/>
  <rect x="230" y="208" width="80" height="8" rx="4" fill="url(#grad-k)" opacity="0.3"/>

  <rect x="210" y="232" width="14" height="8" rx="4" fill="url(#grad-k)" opacity="0.4"/>
  <rect x="230" y="232" width="120" height="8" rx="4" fill="url(#grad-k)" opacity="0.2"/>

  <!-- AI cursor block -->
  <rect x="230" y="256" width="60" height="12" rx="6" fill="url(#grad-k)"/>

  <!-- More code below cursor -->
  <rect x="196" y="280" width="14" height="8" rx="4" fill="url(#grad-k)" opacity="0.3"/>
  <rect x="216" y="280" width="90" height="8" rx="4" fill="url(#grad-k)" opacity="0.2"/>

  <rect x="196" y="304" width="14" height="8" rx="4" fill="url(#grad-k)" opacity="0.4"/>
  <rect x="216" y="304" width="110" height="8" rx="4" fill="url(#grad-k)" opacity="0.25"/>

  <rect x="196" y="328" width="14" height="8" rx="4" fill="url(#grad-k)" opacity="0.3"/>
  <rect x="216" y="328" width="70" height="8" rx="4" fill="url(#grad-k)" opacity="0.2"/>

  <!-- Bottom status bar -->
  <rect x="96" y="360" width="320" height="32" rx="0" fill="url(#grad-k)" opacity="0.08"/>
  <rect x="96" y="376" width="320" height="16" rx="0" fill="url(#bg-k)"/>
  <rect x="96" y="372" width="320" height="20" rx="24" fill="url(#grad-k)" opacity="0.06"/>

  <!-- Status bar dots -->
  <circle cx="120" cy="380" r="4" fill="url(#grad-k)" opacity="0.5"/>
  <rect x="140" y="376" width="40" height="8" rx="4" fill="url(#grad-k)" opacity="0.3"/>
</svg>