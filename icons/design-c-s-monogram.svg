<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
    <linearGradient id="grad-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg-c)"/>

  <!-- Bold S monogram made from two code brackets -->
  <!-- Top half: < shape (reversed as part of S) -->
  <!-- Bottom half: > shape (reversed as part of S) -->
  <g fill="none" stroke="url(#grad-c)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <!-- S curve using bracket-like segments -->
    <path d="M340,175
             C320,155 285,145 255,155
             C220,167 200,195 215,225
             C225,245 250,255 280,260
             L280,260
             C310,265 335,275 345,300
             C355,330 335,360 300,370
             C265,380 225,370 200,345"/>
  </g>

  <!-- Code bracket accents at the ends of S -->
  <!-- Top accent: < -->
  <path d="M310,145 L325,158 L310,171"
        fill="none" stroke="#fbbf24" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom accent: > -->
  <path d="M210,320 L195,333 L210,346"
        fill="none" stroke="#ef4444" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>