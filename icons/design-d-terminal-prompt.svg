<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="grad-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg-d)"/>

  <!-- Terminal prompt >_ - ultra bold, Zed-style -->
  <g fill="none" stroke="url(#grad-d)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <!-- >  prompt symbol -->
    <path d="M165,160 L285,256 L165,352"/>
  </g>

  <!-- Cursor block _ -->
  <rect x="310" y="318" width="80" height="34" rx="8" fill="url(#grad-d)"/>

  <!-- Subtle orbit arc (space reference, very minimal) -->
  <path d="M120,400 Q256,440 392,400"
        fill="none" stroke="url(#grad-d)" stroke-width="4" opacity="0.25" stroke-linecap="round"/>
</svg>