<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IM 集成 - V3 Unified Panel</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   Design Tokens
   ═══════════════════════════════════════════════════════════════ */
:root {
  --font-display: 'Space Grotesk', 'SF Pro Display', system-ui, sans-serif;
  --font-body: 'IBM Plex Sans', 'SF Pro Text', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
  --font-size-base: 14px;

  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);

  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  --bg-primary: #f8f9fb;
  --bg-secondary: #f0f1f5;
  --bg-tertiary: #e7e9ef;
  --bg-elevated: #ffffff;
  --bg-hover: #e4e6ec;

  --surface-soft: #f3f4f8;

  --text-primary: #18191f;
  --text-secondary: #44475a;
  --text-muted: #5c5f7a;
  --text-disabled: #9da1b8;

  --accent-primary: #0d9488;
  --accent-primary-hover: #14b8a6;
  --accent-primary-glow: rgba(13, 148, 136, 0.12);

  --success: #059669;
  --success-glow: rgba(5, 150, 105, 0.15);
  --warning: #d97706;
  --warning-glow: rgba(217, 119, 6, 0.15);
  --error: #dc2626;
  --error-glow: rgba(220, 38, 38, 0.15);

  --border-subtle: rgba(24, 25, 31, 0.05);
  --border-default: rgba(24, 25, 31, 0.09);
  --border-strong: rgba(24, 25, 31, 0.15);

  --shadow-sm: 0 1px 2px rgba(24, 25, 31, 0.06);
  --shadow-md: 0 4px 12px rgba(24, 25, 31, 0.08);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #0d0d0d;
    --bg-secondary: #141414;
    --bg-tertiary: #1a1a1a;
    --bg-elevated: #1f1f1f;
    --bg-hover: #262626;
    --surface-soft: #121212;
    --text-primary: #f5f5f5;
    --text-secondary: #a3a3a3;
    --text-muted: #737373;
    --text-disabled: #525252;
    --accent-primary: #3b82f6;
    --accent-primary-hover: #60a5fa;
    --accent-primary-glow: rgba(59, 130, 246, 0.25);
    --success: #22c55e;
    --success-glow: rgba(34, 197, 94, 0.2);
    --warning: #f59e0b;
    --warning-glow: rgba(245, 158, 11, 0.2);
    --error: #ef4444;
    --error-glow: rgba(239, 68, 68, 0.2);
    --border-subtle: rgba(255, 255, 255, 0.04);
    --border-default: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.15);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  font-size: var(--font-size-base);
  background: var(--bg-secondary);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════════════════════
   Page Layout
   ═══════════════════════════════════════════════════════════════ */
.im-page {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 48px;
}

.page-header {
  margin-bottom: 28px;
}

.page-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.page-desc {
  font-size: 13.5px;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════════════
   Buttons
   ═══════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
}

.btn:active { transform: scale(0.98); }

.btn-primary {
  background: var(--accent-primary);
  color: #fff;
}

.btn-primary:hover {
  background: var(--accent-primary-hover);
}

.btn-secondary {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border-default);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.btn-danger-outline {
  background: transparent;
  color: var(--error);
  border: 1px solid var(--error);
}

.btn-danger-outline:hover {
  background: var(--error-glow);
}

.btn-sm { padding: 6px 12px; font-size: 12px; }

.btn-icon {
  width: 30px;
  height: 30px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-icon.danger:hover { background: var(--error-glow); color: var(--error); }

/* ═══════════════════════════════════════════════════════════════
   Server Status (inline header strip)
   ═══════════════════════════════════════════════════════════════ */
.server-strip {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
}

.server-strip.running { border-color: var(--success); }

.server-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}

.server-dot.running {
  background: var(--success);
  box-shadow: 0 0 0 3px var(--success-glow);
}

.server-info {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}

.server-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.server-meta {
  font-size: 11.5px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════════════════════════════
   Platform Pills (compact tab selector)
   ═══════════════════════════════════════════════════════════════ */
.platform-pills {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.platform-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border-default);
  background: var(--bg-elevated);
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-secondary);
  font-family: var(--font-body);
}

.platform-pill:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.platform-pill.active {
  background: var(--accent-primary);
  color: #fff;
  border-color: var(--accent-primary);
}

.platform-pill-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
}

.platform-pill.active .platform-pill-dot {
  background: #fff;
  box-shadow: 0 0 4px rgba(255,255,255,0.6);
}

/* ═══════════════════════════════════════════════════════════════
   Unified Card (single panel for everything)
   ═══════════════════════════════════════════════════════════════ */
.unified-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 16px;
}

.card-section {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border-subtle);
}

.card-section:last-child { border-bottom: none; }

.card-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  font-family: var(--font-display);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-section-title-icon {
  width: 24px;
  height: 24px;
  border-radius: var(--radius-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-primary-glow);
  color: var(--accent-primary);
}

.adapter-status-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  font-size: 11.5px;
  font-weight: 600;
  border-radius: var(--radius-full);
  background: var(--success-glow);
  color: var(--success);
}

.adapter-status-tag::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  animation: pulse-dot 2s ease-in-out infinite;
}

.adapter-status-tag.stopped {
  background: var(--bg-tertiary);
  color: var(--text-muted);
}

.adapter-status-tag.stopped::before { animation: none; }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Form */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }

.form-label {
  display: block;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 5px;
}

.form-hint {
  display: block;
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 4px;
}

.form-input {
  width: 100%;
  padding: 9px 12px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text-primary);
  background: var(--bg-elevated);
  border: 1.5px solid var(--border-default);
  border-radius: var(--radius-sm);
  outline: none;
  transition: all var(--transition-fast);
}

.form-input::placeholder { color: var(--text-muted); }

.form-input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px var(--accent-primary-glow);
}

.form-input.mono {
  font-family: var(--font-mono);
  font-size: 12px;
}

.form-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  padding-top: 14px;
  border-top: 1px solid var(--border-subtle);
}

/* ═══════════════════════════════════════════════════════════════
   Pairing Section
   ═══════════════════════════════════════════════════════════════ */
.pairing-display {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 16px 20px;
  background: var(--surface-soft);
  border-radius: var(--radius-md);
  margin-bottom: 14px;
}

.pairing-code-block {
  text-align: center;
  flex-shrink: 0;
  padding-right: 20px;
  border-right: 1px solid var(--border-default);
}

.pairing-code-text {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 6px;
  color: var(--accent-primary);
  line-height: 1;
}

.pairing-code-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}

.pairing-info-block {
  flex: 1;
}

.pairing-expiry-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.pairing-expiry-icon {
  color: var(--warning);
}

.pairing-actions {
  display: flex;
  gap: 6px;
}

/* Paired Users (inline list) */
.paired-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.paired-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
}

.paired-row:hover { background: var(--surface-soft); }

.paired-row-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.paired-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.paired-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
}

.paired-id {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.paired-time {
  font-size: 11px;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════════════════════════════
   Default Dir inline
   ═══════════════════════════════════════════════════════════════ */
.dir-inline {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dir-inline-input {
  flex: 1;
  padding: 9px 12px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--text-primary);
  background: var(--bg-elevated);
  border: 1.5px solid var(--border-default);
  border-radius: var(--radius-sm);
  outline: none;
  transition: all var(--transition-fast);
}

.dir-inline-input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px var(--accent-primary-glow);
}

/* ═══════════════════════════════════════════════════════════════
   Variant Label
   ═══════════════════════════════════════════════════════════════ */
.variant-label {
  position: fixed;
  top: 16px;
  right: 16px;
  padding: 6px 14px;
  background: var(--accent-primary);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-md);
  z-index: 100;
  font-family: var(--font-display);
}

svg { display: block; }

@media (max-width: 640px) {
  .im-page { padding: 24px 20px; }
  .form-row { grid-template-columns: 1fr; }
  .pairing-display { flex-direction: column; align-items: stretch; }
  .pairing-code-block { border-right: none; border-bottom: 1px solid var(--border-default); padding-right: 0; padding-bottom: 12px; }
}
</style>
</head>
<body>

<div class="variant-label">V3 Unified Panel</div>

<div class="im-page">
  <!-- Page Header -->
  <div class="page-header">
    <h1 class="page-title">IM 集成</h1>
    <p class="page-desc">配置即时通讯平台适配器，通过 Telegram、飞书、钉钉等平台与 SpaceCode 对话</p>
  </div>

  <!-- Server Status -->
  <div class="server-strip running" id="serverStrip">
    <div class="server-dot running" id="serverDot"></div>
    <div class="server-info">
      <span class="server-label" id="serverLabel">IM 服务器运行中</span>
      <span class="server-meta" id="serverMeta">ws://127.0.0.1:3456 · PID 18432</span>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="toggleServer()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
      停止
    </button>
  </div>

  <!-- Platform Pills -->
  <div class="platform-pills">
    <button class="platform-pill active" onclick="selectPill(this)">
      <span class="platform-pill-dot"></span>
      Telegram
    </button>
    <button class="platform-pill" onclick="selectPill(this)">
      飞书
    </button>
    <button class="platform-pill" onclick="selectPill(this)">
      钉钉
    </button>
    <button class="platform-pill" onclick="selectPill(this)">
      微信
    </button>
    <button class="platform-pill" onclick="selectPill(this)">
      WhatsApp
    </button>
  </div>

  <!-- Unified Card: Platform Config -->
  <div class="unified-card">
    <div class="card-section">
      <div class="card-section-header">
        <div class="card-section-title">
          <div class="card-section-title-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 4.5L2.5 12.5l6 2 2 6 4-4 5 4z"/></svg>
          </div>
          Telegram 配置
        </div>
        <span class="adapter-status-tag" id="adapterTag">运行中</span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Bot Token</label>
          <input type="password" class="form-input mono" placeholder="123456:ABC-DEF..." value="••••••••••••••••" />
          <span class="form-hint">从 @BotFather 获取</span>
        </div>
        <div class="form-group">
          <label class="form-label">默认工作目录</label>
          <input type="text" class="form-input mono" placeholder="/home/user/projects" value="/home/user/spacecode-projects" />
        </div>
      </div>

      <div class="form-footer">
        <button class="btn btn-danger-outline btn-sm" onclick="toggleAdapter()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          <span id="adapterBtnText">停止适配器</span>
        </button>
        <button class="btn btn-primary btn-sm">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          保存配置
        </button>
      </div>
    </div>
  </div>

  <!-- Unified Card: Pairing -->
  <div class="unified-card">
    <div class="card-section">
      <div class="card-section-header">
        <div class="card-section-title">
          <div class="card-section-title-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3"/></svg>
          </div>
          配对管理
        </div>
      </div>

      <!-- Pairing Code Display -->
      <div class="pairing-display">
        <div class="pairing-code-block">
          <div class="pairing-code-text">7K3M9X</div>
          <div class="pairing-code-label">配对码</div>
        </div>
        <div class="pairing-info-block">
          <div class="pairing-expiry-row">
            <svg class="pairing-expiry-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>过期时间: 47m 32s</span>
          </div>
          <div class="pairing-actions">
            <button class="btn btn-secondary btn-sm">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3"/></svg>
              重新生成
            </button>
            <button class="btn btn-secondary btn-sm">清除</button>
          </div>
        </div>
      </div>

      <!-- Paired Users -->
      <div class="paired-list">
        <div class="paired-row">
          <div class="paired-row-info">
            <div class="paired-avatar">Y</div>
            <div>
              <div class="paired-name">雅坤</div>
              <div class="paired-id">telegram:88472915</div>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <span class="paired-time">2024-01-15</span>
            <button class="btn-icon danger">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            </button>
          </div>
        </div>

        <div class="paired-row">
          <div class="paired-row-info">
            <div class="paired-avatar">L</div>
            <div>
              <div class="paired-name">Liu Wei</div>
              <div class="paired-id">telegram:62910483</div>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 10px;">
            <span class="paired-time">2024-01-12</span>
            <button class="btn-icon danger">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Unified Card: Default Dir -->
  <div class="unified-card">
    <div class="card-section">
      <div class="card-section-header">
        <div class="card-section-title">
          <div class="card-section-title-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2z"/></svg>
          </div>
          默认项目目录
        </div>
      </div>

      <div class="dir-inline">
        <input type="text" class="dir-inline-input" placeholder="/home/user/projects" value="/home/user/spacecode-projects" />
        <button class="btn btn-secondary btn-sm">浏览</button>
      </div>
      <span class="form-hint" style="margin-top: 6px;">所有未单独设置工作目录的平台适配器将使用此路径</span>
    </div>
  </div>
</div>

<script>
function selectPill(el) {
  document.querySelectorAll('.platform-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

function toggleServer() {
  const strip = document.getElementById('serverStrip');
  const dot = document.getElementById('serverDot');
  const label = document.getElementById('serverLabel');
  const meta = document.getElementById('serverMeta');
  const btn = event.target.closest('button');

  if (strip.classList.contains('running')) {
    strip.classList.remove('running');
    dot.classList.remove('running');
    label.textContent = 'IM 服务器未运行';
    meta.textContent = '点击启动以开始接收 IM 消息';
    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> 启动';
    btn.className = 'btn btn-primary btn-sm';
  } else {
    strip.classList.add('running');
    dot.classList.add('running');
    label.textContent = 'IM 服务器运行中';
    meta.textContent = 'ws://127.0.0.1:3456 · PID 18432';
    btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg> 停止';
    btn.className = 'btn btn-secondary btn-sm';
  }
}

function toggleAdapter() {
  const tag = document.getElementById('adapterTag');
  const btnText = document.getElementById('adapterBtnText');
  const btn = event.target.closest('button');

  if (tag.classList.contains('stopped')) {
    tag.classList.remove('stopped');
    tag.textContent = '运行中';
    btnText.textContent = '停止适配器';
    btn.className = 'btn btn-danger-outline btn-sm';
  } else {
    tag.classList.add('stopped');
    tag.textContent = '已停止';
    btnText.textContent = '启动适配器';
    btn.className = 'btn btn-primary btn-sm';
  }
}
</script>
</body>
</html>
